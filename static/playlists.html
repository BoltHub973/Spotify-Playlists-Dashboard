<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="playlists-page" data-page-id="playlists">
    <div class="app-container">
      <!-- Current Track Header -->
      <header class="current-track">
        <img
          id="album-cover"
          class="album-cover"
          src=""
          alt="Album Cover"
          style="display: none"
        />
        <div class="track-info">
          <h1 class="track-title" id="track-title">Loading...</h1>
          <div class="artist-row">
            <h2 class="artist-name" id="artist-name">Loading...</h2>
          </div>
        </div>
        <div class="page-identifier">PLAYLISTS</div>
        <img id="repeat-icon" class="repeat-icon" src="images/Playlists/repeat-green.png" alt="Toggle Repeat" style="display: none" />
        <div class="visualizer">
          <!-- Waveform bars generated dynamically by JS -->
          <div
            id="nothing-playing"
            class="nothing-playing"
            style="display: none"
          >
            Nothing Playing...
          </div>
        </div>
      </header>

      <!-- Playlist Grid -->
      <main class="playlist-section">
        <div class="grid-header">
          <button id="add-playlist-btn" class="grid-header-btn" type="button">＋ NEW</button>
          <button id="edit-mode-btn" class="grid-header-btn" type="button">✎ EDIT</button>
        </div>
        <div class="playlist-grid" id="playlist-grid">
          <!-- Playlist Items will be injected here by JS -->
        </div>
      </main>

      <!-- Artist Release Sidebar -->
      <aside id="artist-sidebar" class="artist-sidebar" aria-label="Artist Latest Release">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <div class="sidebar-content" id="sidebar-content">
          <div class="sidebar-artwork-wrap">
            <img id="sidebar-artwork" class="sidebar-artwork" src="" alt="Album/EP Artwork" />
            <div class="sidebar-release-badge" id="sidebar-release-badge">ALBUM</div>
          </div>
          <div class="sidebar-meta">
            <h3 class="sidebar-release-name" id="sidebar-release-name">—</h3>
            <p class="sidebar-artist-name" id="sidebar-artist-name">—</p>
            <span class="sidebar-release-date" id="sidebar-release-date">—</span>
          </div>
          <div class="sidebar-actions">
            <button id="sidebar-follow-btn" class="sidebar-action-btn follow-btn" aria-label="Follow artist">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
              <span id="follow-btn-text">Follow</span>
            </button>
            <button id="sidebar-library-btn" class="sidebar-action-btn library-btn" aria-label="Add to library">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
              </svg>
              <span id="library-btn-text">Save to Library</span>
            </button>
          </div>
          <div class="sidebar-queue-section">
            <div class="sidebar-queue-label">ADD TO QUEUE</div>
            <div class="sidebar-queue-list" id="sidebar-queue-list">
              <!-- Queue playlists injected by JS -->
            </div>
          </div>
        </div>
      </aside>
    </div>

    <!-- Playlist Editor Modal -->
    <div id="playlist-editor-overlay" class="editor-overlay" hidden>
      <div class="editor-modal" role="dialog" aria-modal="true" aria-labelledby="editor-title">
        <h3 class="editor-title" id="editor-title">NEW PLAYLIST</h3>

        <label class="editor-label" for="editor-display-name">DISPLAY NAME</label>
        <input
          id="editor-display-name"
          class="editor-input"
          type="text"
          placeholder="Name shown on this page"
          autocomplete="off"
          spellcheck="false"
        />

        <label class="editor-label" for="editor-spotify-search">SPOTIFY PLAYLIST TO UPDATE</label>
        <input
          id="editor-spotify-search"
          class="editor-input"
          type="text"
          placeholder="Search your Spotify playlists…"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="editor-spotify-list" class="editor-spotify-list"></div>
        <div id="editor-selected" class="editor-selected" hidden></div>

        <div id="editor-error" class="editor-error" hidden></div>

        <div class="editor-actions">
          <button id="editor-cancel" class="editor-btn ghost" type="button">CANCEL</button>
          <button id="editor-save" class="editor-btn primary" type="button">SAVE</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
